services:
  app:
    build: .
    container_name: fulfillsight_app
    env_file:
      - .env

  postgres:
    image: postgres:17
    container_name: fulfillsight_postgres

    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql